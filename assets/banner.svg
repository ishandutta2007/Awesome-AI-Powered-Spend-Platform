<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe">
        <animate attributeName="stop-color" values="#4facfe;#00f2fe;#4facfe" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00f2fe">
        <animate attributeName="stop-color" values="#00f2fe;#4facfe;#00f2fe" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="800" height="200" rx="15" fill="url(#grad)" />
  
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" filter="url(#shadow)">
    Awesome AI-Powered Spend Platforms
  </text>
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" opacity="0.9">
    Curated list of SaaS &amp; Open-Source tools for Corporate Spend
  </text>
  
  <circle cx="100" cy="50" r="10" fill="white" opacity="0.5">
    <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="150" r="15" fill="white" opacity="0.3">
    <animate attributeName="cy" values="150;170;150" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="150" cy="160" r="8" fill="white" opacity="0.6">
    <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="650" cy="40" r="12" fill="white" opacity="0.4">
    <animate attributeName="cy" values="40;20;40" dur="3.5s" repeatCount="indefinite" />
  </circle>
</svg>
